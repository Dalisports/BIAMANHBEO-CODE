<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f59e0b" />
    <title>Offline - Bia Mạnh Béo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #f8fafc;
        padding: 1rem;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: 1.75rem;
        margin-bottom: 0.75rem;
        color: #f59e0b;
      }
      p {
        color: #94a3b8;
        margin-bottom: 1.5rem;
        line-height: 1.6;
      }
      .retry-btn {
        background: #f59e0b;
        color: #0f172a;
        border: none;
        padding: 0.875rem 2rem;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: background 0.2s;
      }
      .retry-btn:hover {
        background: #d97706;
      }
      .status {
        margin-top: 2rem;
        padding: 1rem;
        background: rgba(239, 68, 68, 0.1);
        border-radius: 0.5rem;
        font-size: 0.875rem;
        color: #fca5a5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>Không có kết nối</h1>
      <p>Rất tiếc, bạn đang ở chế độ offline. Vui lòng kiểm tra kết nối internet và thử lại.</p>
      <button class="retry-btn" onclick="window.location.reload()">
        Thử lại
      </button>
      <div class="status">
        💡 <strong>Mẹo:</strong> Ứng dụng đã được lưu trong bộ nhớ tạm. Bạn vẫn có thể xem thực đơn khi offline!
      </div>
    </div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('online', () => window.location.reload());
      }
    </script>
  </body>
</html>

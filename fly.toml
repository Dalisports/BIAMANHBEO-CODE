app = "biamanhbeo-prod"

[http]
  port = 8080
  force_https = false

[proxy]
  enable_connect = true

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connection"
    hard_limit = 1000
    soft_limit = 100

# WebSocket support - health checks
[[services.tcp_checks]]
  interval = "15s"
  timeout = "2s"
  grace_period = "1s"
  restart_limit = 0

[env]
  NODE_ENV = "production"
  PORT = "8080"

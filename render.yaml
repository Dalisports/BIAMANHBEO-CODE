services:
  - type: web
    name: biamanhbeo-web
    env: node
    plan: free # Change this to starter or standard if you need more power and no cold starts
    buildCommand: npm install && npm run db:push && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: biamanhbeo-db
          property: connectionString
      # Các biến môi trường bảo mật (sync: false) - Cấu hình thủ công trên Render Dashboard
      - key: NVIDIA_API_KEY
        sync: false
      - key: GOOGLE_AI_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: VITE_UPLOAD_URL
        sync: false
      - key: VMIX_HOST
        sync: false
      - key: VMIX_PORT
        sync: false

databases:
  - name: biamanhbeo-db
    plan: free # Change to starter for automated backups and more resources
    databaseName: biamanhbeo
    user: biamanhbeo
